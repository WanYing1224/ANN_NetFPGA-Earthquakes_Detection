<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPGA Tensor Unit SIMD Simulator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #4ade80;
            --warning: #facc15;
            --danger: #f87171;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-top: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 5px;
        }

        .array-container {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
        }

        .array-box {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 0;
            text-align: center;
            font-family: monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .array-box.active {
            background-color: rgba(56, 189, 248, 0.2);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
            transform: scale(1.05);
            z-index: 10;
        }

        .array-box.processed {
            opacity: 0.4;
        }

        .mac-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .mac-unit {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .mac-unit.active {
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .mac-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .mac-math {
            font-family: monospace;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .mac-result {
            color: var(--success);
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
        }

        .bottom-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-box.active-bias {
            border-color: var(--warning);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
        }

        .stat-box.active-acc {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            background-color: rgba(56, 189, 248, 0.1);
        }

        .stat-value {
            font-family: monospace;
            font-size: 2rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            background-color: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--border);
        }

        #btn-step {
            background-color: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        #btn-step:hover {
            background-color: #0ea5e9;
            border-color: #0ea5e9;
        }

        .status-text {
            text-align: center;
            margin-top: 20px;
            font-family: monospace;
            color: var(--text-muted);
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>64-Bit SIMD Tensor Unit Visualization</h1>

        <div class="section-title">Feature BRAM (Input X)</div>
        <div class="array-container" id="array-x"></div>

        <div class="section-title">Weight BRAM (Input W)</div>
        <div class="array-container" id="array-w"></div>

        <div class="section-title">Parallel BF_MAC Execution Lanes</div>
        <div class="mac-container" id="mac-units">
            </div>

        <div class="bottom-panel">
            <div class="stat-box" id="box-bias">
                <div class="section-title" style="margin-top:0; border:none;">Layer Bias ROM</div>
                <div class="stat-value" style="color: var(--warning);" id="val-bias">-0.4276</div>
            </div>
            <div class="stat-box" id="box-acc">
                <div class="section-title" style="margin-top:0; border:none;">Accumulator Register</div>
                <div class="stat-value" style="color: var(--accent);" id="val-acc">0.0000</div>
            </div>
        </div>

        <div class="status-text" id="status-msg">System Ready. Awaiting trigger.</div>

        <div class="controls">
            <button id="btn-reset" onclick="resetSim()">System Reset</button>
            <button id="btn-step" onclick="nextStep()">Step Execution (LD64 + MAC)</button>
        </div>
    </div>

    <script>
        // Data Arrays (12 items to simulate 3 chunks of 4)
        const X_DATA = [1.0, 0.5, -1.0, 2.0, 0.5, -0.5, 1.5, -1.0, 2.0, 1.0, -0.5, 0.5];
        const W_DATA = [0.5, -1.0, 0.5, 0.5, 1.0, 2.0, -0.5, -1.0, 0.5, 0.5, 2.0, 1.0];
        const BIAS_VAL = -0.4276;

        let currentStep = 0;
        let accumulator = 0;

        // Initialize UI
        function initUI() {
            const containerX = document.getElementById('array-x');
            const containerW = document.getElementById('array-w');
            const containerMac = document.getElementById('mac-units');

            containerX.innerHTML = '';
            containerW.innerHTML = '';
            containerMac.innerHTML = '';

            for (let i = 0; i < 12; i++) {
                containerX.innerHTML += `<div class="array-box" id="x-${i}">${X_DATA[i].toFixed(1)}</div>`;
                containerW.innerHTML += `<div class="array-box" id="w-${i}">${W_DATA[i].toFixed(1)}</div>`;
            }

            for (let i = 0; i < 4; i++) {
                containerMac.innerHTML += `
                    <div class="mac-unit" id="mac-${i}">
                        <div class="mac-title">Lane ${i}</div>
                        <div class="mac-math" id="math-${i}">0.0 × 0.0</div>
                        <div class="mac-result" id="res-${i}">= 0.000</div>
                    </div>
                `;
            }
        }

        function updateAccumulator(val, highlight = true) {
            const accEl = document.getElementById('val-acc');
            const boxAcc = document.getElementById('box-acc');
            
            accEl.innerText = val.toFixed(4);
            
            if (highlight) {
                boxAcc.classList.add('active-acc');
                setTimeout(() => boxAcc.classList.remove('active-acc'), 500);
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.array-box').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.mac-unit').forEach(el => el.classList.remove('active'));
            document.getElementById('box-bias').classList.remove('active-bias');
        }

        function markProcessed(startIndex) {
            for(let i=0; i<startIndex; i++) {
                document.getElementById(`x-${i}`).classList.add('processed');
                document.getElementById(`w-${i}`).classList.add('processed');
            }
        }

        function nextStep() {
            const statusMsg = document.getElementById('status-msg');
            const btnStep = document.getElementById('btn-step');

            clearHighlights();

            if (currentStep < 3) {
                // Chunking Phase
                const startIdx = currentStep * 4;
                let chunkSum = 0;

                markProcessed(startIdx);

                for (let i = 0; i < 4; i++) {
                    const dataIdx = startIdx + i;
                    const x = X_DATA[dataIdx];
                    const w = W_DATA[dataIdx];
                    const prod = x * w;
                    chunkSum += prod;

                    // Highlight arrays
                    document.getElementById(`x-${dataIdx}`).classList.add('active');
                    document.getElementById(`w-${dataIdx}`).classList.add('active');

                    // Update MACs
                    document.getElementById(`mac-${i}`).classList.add('active');
                    document.getElementById(`math-${i}`).innerText = `${x.toFixed(1)} × ${w.toFixed(1)}`;
                    document.getElementById(`res-${i}`).innerText = `= ${prod.toFixed(3)}`;
                }

                accumulator += chunkSum;
                updateAccumulator(accumulator);
                
                statusMsg.innerText = `Executing LD64 + LDW64 + BF_MAC (Chunk ${currentStep + 1}/3)`;
                currentStep++;
                
                if (currentStep === 3) {
                    btnStep.innerText = "Execute LDB64 (Add Bias)";
                }

            } else if (currentStep === 3) {
                // Add Bias Phase
                markProcessed(12);
                
                // Zero out MAC displays visually
                for (let i = 0; i < 4; i++) {
                    document.getElementById(`math-${i}`).innerText = `---`;
                    document.getElementById(`res-${i}`).innerText = `---`;
                }

                document.getElementById('box-bias').classList.add('active-bias');
                accumulator += BIAS_VAL;
                updateAccumulator(accumulator);

                statusMsg.innerText = `Executing LDB64. Bias added. Output Ready for ST64.`;
                btnStep.innerText = "Simulation Complete";
                btnStep.disabled = true;
                btnStep.style.opacity = "0.5";
                currentStep++;
            }
        }

        function resetSim() {
            currentStep = 0;
            accumulator = 0;
            updateAccumulator(0, false);
            clearHighlights();
            document.querySelectorAll('.array-box').forEach(el => el.classList.remove('processed'));
            
            for (let i = 0; i < 4; i++) {
                document.getElementById(`math-${i}`).innerText = `0.0 × 0.0`;
                document.getElementById(`res-${i}`).innerText = `= 0.000`;
            }

            document.getElementById('status-msg').innerText = "System Ready. Awaiting trigger.";
            
            const btnStep = document.getElementById('btn-step');
            btnStep.innerText = "Step Execution (LD64 + MAC)";
            btnStep.disabled = false;
            btnStep.style.opacity = "1";
        }

        // Boot
        initUI();
    </script>
</body>
</html>
